prefix: "<gold>Tourneys</gold> <dark_gray>»</dark_gray> "

messages:
  usage: "<gray>Use /tourney open, close, start, restart, bracket, team, arena, or kit.</gray>"
  usage-team: "<red>Use /tourney team create, invite <player>, accept <team>, leave, or list.</red>"
  usage-arena: "<red>Use /tourney arena create <name>, setspawn <arena> teamA|teamB|spectator, delete <name>, or list.</red>"
  usage-kit: "<red>Use /tourney kit save while holding the kit inventory.</red>"
  no-permission: "<red>You do not have permission.</red>"
  player-only: "<red>Only players can use that command.</red>"
  bad-state: "<red>That cannot be done while the tournament is {state}.</red>"
  registration-open: "<gold>{tournament}</gold> <green>registration is open.</green>"
  registration-closed: "<gold>Registration closed.</gold> <gray>{teams} teams are in the bracket.</gray>"
  tournament-started: "<gold>The tournament has started.</gold>"
  tournament-cancelled: "<red>The tournament was cancelled.</red>"
  tournament-restarted: "<gold>{tournament}</gold> <yellow>was restarted. Registration is open again.</yellow>"
  tournament-finished: "<gold>Tournament finished.</gold> <green>{winner} won.</green>"
  registration-not-open: "<red>Registration is not open.</red>"
  already-in-team: "<red>You are already in a team.</red>"
  not-in-team: "<red>You are not in a team.</red>"
  max-teams: "<red>The tournament is full.</red>"
  team-created: "<green>You created <gold>{team}</gold>.</green>"
  team-name-taken: "<red>That team name is already taken.</red>"
  captain-required: "<red>Only the captain can do that.</red>"
  team-full: "<red>That team is full.</red>"
  target-in-team: "<red>{player} is already in a team.</red>"
  invite-sent: "<green>Invited {player} to <gold>{team}</gold>.</green>"
  invite-received: "<gold>{player}</gold> <green>invited you to <gold>{team}</gold>. Use /tourney team accept {team}.</green>"
  no-invite: "<red>You do not have an invite from that team.</red>"
  joined-team: "<green>You joined <gold>{team}</gold>.</green>"
  player-joined-team: "<gold>{player}</gold> <green>joined <gold>{team}</gold>.</green>"
  cannot-leave-now: "<red>You can only leave during registration.</red>"
  team-disbanded: "<red><gold>{team}</gold> was disbanded.</red>"
  left-team: "<green>You left <gold>{team}</gold>.</green>"
  player-left-team: "<gold>{player}</gold> <yellow>left <gold>{team}</gold>.</yellow>"
  no-teams: "<gray>No teams are registered.</gray>"
  player-not-found: "<red>That player is not online.</red>"
  removed-incomplete-teams: "<yellow>Removed {count} incomplete teams.</yellow>"
  incomplete-teams-block-close: "<red>Incomplete teams must be resolved before closing registration.</red>"
  not-enough-teams: "<red>At least {minimum} teams are required.</red>"
  no-ready-arenas: "<red>No arenas have teamA, teamB, and spectator spawns set.</red>"
  match-countdown: "<gold>Match {match}</gold> <gray>starts soon in arena {arena}.</gray>"
  match-started: "<gold>Match {match}</gold> <green>{teamA} vs {teamB} is live in {arena}.</green>"
  match-finished: "<gold>Match {match}</gold> <green>{winner} won.</green>"
  match-rematch: "<yellow>Match {match} ended tied and will be replayed.</yellow>"
  command-blocked: "<red>You cannot use that command during the tournament.</red>"
  bracket-disabled: "<red>The bracket GUI is disabled.</red>"
  bracket-url: "<gold>Bracket:</gold> <yellow>{url}</yellow>"
  reload-blocked: "<red>Reload is disabled while a tournament is running.</red>"
  reloaded: "<green>Tourneys reloaded.</green> <gray>Config warnings: {errors}</gray>"
  kit-saved: "<green>Saved {items} inventory items as the tournament kit.</green>"
  arena-created: "<green>Created arena <gold>{arena}</gold>.</green>"
  arena-exists: "<red>That arena already exists.</red>"
  arena-spawn-set: "<green>Set {spawn} spawn for <gold>{arena}</gold>.</green>"
  arena-deleted: "<green>Deleted arena <gold>{arena}</gold>.</green>"
  arena-not-found: "<red>That arena was not found, or the spawn type is invalid.</red>"
  no-arenas: "<gray>No arenas are configured.</gray>"

titles:
  match-start:
    title: "<gold>Fight</gold>"
    subtitle: "<gray>Match {match}</gray>"

actionbars:
  waiting: "<gray>Waiting for your match...</gray>"
